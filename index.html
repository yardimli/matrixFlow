<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>The Blue Pill</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <canvas id="matrix" aria-hidden="true"></canvas>

    <main class="game-shell" id="game">
      <header class="hud">
        <section class="metric metric-primary" aria-label="Hashes">
          <strong id="hashes">0</strong>
          <span>hashes</span>
        </section>
        <section class="metric metric-core" aria-label="Cores">
          <strong id="cores">0</strong>
          <span id="cores-label">cores</span>
        </section>
        <section class="metric metric-bots" id="bots-metric" aria-label="Bots" hidden>
          <strong id="bots">0</strong>
          <span id="bots-label">bots</span>
        </section>
      </header>

      <section class="page" id="page" aria-live="polite"></section>

      <footer class="menu-shell">
        <div class="page-name" id="page-name">matrix</div>
        <nav class="menu-row menu-row-top" aria-label="Primary menu">
          <button class="menu-button" type="button" data-page="matrix">M</button>
          <button class="menu-button" type="button" data-page="research">R</button>
          <button class="menu-button" type="button" data-page="programs">P</button>
          <button class="menu-button" type="button" data-page="roguePrograms">G</button>
          <button class="menu-button" type="button" data-page="operator">O</button>
          <button class="menu-button" type="button" data-page="executions">E</button>
        </nav>
        <nav class="menu-row menu-row-bottom" aria-label="Secondary menu">
          <button class="menu-button" type="button" data-page="story">S</button>
          <button class="menu-button" type="button" data-page="statistics">#</button>
          <button class="menu-button" type="button" data-page="backdoors">B</button>
          <button class="menu-button" type="button" data-page="help">?</button>
          <button class="menu-button" type="button" data-page="about">&amp;</button>
        </nav>
      </footer>
    </main>

    <script src="vendor/break_eternity.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/state.js"></script>
    <script src="js/economy.js"></script>
    <script src="js/matrix-renderer.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
